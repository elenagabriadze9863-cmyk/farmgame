name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compile JSX and bundle libs
        run: |
          npm install -g @babel/core @babel/cli @babel/preset-react @babel/preset-env 2>/dev/null
          cd android/app/src/main/assets/www
          curl -sL https://unpkg.com/react@18/umd/react.production.min.js -o react.js
          curl -sL https://unpkg.com/react-dom@18/umd/react-dom.production.min.js -o react-dom.js
          curl -sL https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js -o lucide.js
          curl -sL https://cdn.tailwindcss.com -o tailwind.js
          python3 - << 'PYEOF'
import re
with open('index.html', 'r') as f:
    content = f.read()
start_tag = '<script type="text/babel" data-presets="react">'
start = content.find(start_tag) + len(start_tag)
end = content.rfind('</script>')
jsx_code = content[start:end]
with open('/tmp/game.jsx', 'w') as f:
    f.write(jsx_code)
print(f"Extracted {len(jsx_code)} chars")
PYEOF
          babel /tmp/game.jsx --presets @babel/preset-react,@babel/preset-env --out-file game.js
          python3 - << 'PYEOF'
import re
with open('index.html', 'r') as f:
    content = f.read()
content = content.replace('https://unpkg.com/react@18/umd/react.production.min.js', 'react.js')
content = content.replace('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', 'react-dom.js')
content = content.replace('https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js', 'lucide.js')
content = content.replace('https://cdn.tailwindcss.com', 'tailwind.js')
content = re.sub(r'<script src="[^"]*babel[^"]*"[^>]*></script>\n?', '', content)
start = content.find('<script type="text/babel"')
end = content.rfind('</script>') + len('</script>')
content = content[:start] + '<script src="game.js"></script>' + content[end:]
with open('index.html', 'w') as f:
    f.write(content)
print("Done")
PYEOF
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH
      - name: Build APK
        run: |
          cd android
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: farmgame-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
