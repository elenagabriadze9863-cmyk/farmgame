name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compile JSX and bundle libs
        run: |
          npm install @babel/core @babel/cli @babel/preset-react @babel/preset-env
          curl -sL https://unpkg.com/react@18/umd/react.production.min.js -o android/app/src/main/assets/www/react.js
          curl -sL https://unpkg.com/react-dom@18/umd/react-dom.production.min.js -o android/app/src/main/assets/www/react-dom.js
          curl -sL https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js -o android/app/src/main/assets/www/lucide.js
          curl -sL https://cdn.tailwindcss.com -o android/app/src/main/assets/www/tailwind.js
          python3 scripts/extract_jsx.py
          ./node_modules/.bin/babel /tmp/game.jsx --presets @babel/preset-react,@babel/preset-env --out-file android/app/src/main/assets/www/game.js
          python3 scripts/patch_html.py
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH
      - name: Build APK
        run: |
          cd android
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: farmgame-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
